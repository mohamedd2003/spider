<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="src/assets/spider.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <title>Spider Agency</title>
  </head>
  <body>
    <script>
      // Default to dark theme — only go light if explicitly chosen
      if (localStorage.getItem('theme') !== 'light') document.documentElement.classList.add('dark');
    </script>
    <div id="root" class="bg-white dark:bg-black text-gray-900 dark:text-white overflow-x-hidden overflow-y-auto transition-colors duration-300"></div>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      /* Dark mode: class-based toggle for Tailwind v4 browser CDN */
      @custom-variant dark (&:where(.dark, .dark *));
    </style>
    
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
